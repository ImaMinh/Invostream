<!doctype html>
<html lang="en">
  <head>
    <title>Invoice Upload</title>
  </head>

  <body style="background-color: rgb(39, 39, 39)">
    <div
      style="
        width: 30%;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        background-color: lightgray;
      "
    >
      <form
        id="folder-submission-form"
        method="post"
        enctype="multipart/form-data"
      >
        <input
          name="folder"
          id="folder-submission-form-input"
          type="file"
          webkitdirectory
          directory
          multiple
        />
      </form>
      <button form="folder-submission-form">Upload</button>
    </div>

    <script src="./../scripts/main.js"></script>
  </body>
</html>
